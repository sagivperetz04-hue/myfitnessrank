apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    # After the stack (wave 1) so the ServiceMonitor CRD exists; the retry below
    # covers the gap if this still syncs before the CRD is registered.
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: myfitnessrank
  source:
    repoURL: https://github.com/sagivperetz04-hue/myfitnessrank.git
    targetRevision: master
    path: helm/monitoring
    helm:
      # Scope scraping/alerts to this cluster's namespaces (only dev runs here);
      # the chart default lists all three.
      values: |
        appNamespaces:
          - myfitnessrank-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        maxDuration: 5m
        factor: 2
