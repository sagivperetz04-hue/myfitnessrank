# App-of-apps: the only Application applied by hand (kubectl apply -f).
# It syncs deploy/argocd/local/ (the kind cluster: dev env only). The EKS
# cluster gets its own root app (deploy/argocd/aws/) planted by Terraform.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myfitnessrank-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sagivperetz04-hue/myfitnessrank.git
    targetRevision: master
    path: deploy/argocd/local
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
