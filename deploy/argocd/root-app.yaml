# App-of-apps: the only Application applied by hand (kubectl apply -f).
# It syncs deploy/argocd/apps/, which defines one Application per service.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myfitnessrank-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sagivperetz04-hue/myfitnessrank.git
    targetRevision: feature/RND-003-leaderboards-service
    path: deploy/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
