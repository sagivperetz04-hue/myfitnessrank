apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-secrets
  namespace: argocd
  annotations:
    # Before the services (wave 1): the DB pods can't start without these
    # secrets. The retry covers a fresh cluster where the ExternalSecret CRDs
    # register moments before this syncs.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: myfitnessrank
  source:
    repoURL: https://github.com/sagivperetz04-hue/myfitnessrank.git
    targetRevision: master
    path: helm/app-secrets
  # Every rendered resource carries its own namespace; this is the fallback only.
  destination:
    server: https://kubernetes.default.svc
    namespace: myfitnessrank-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        maxDuration: 5m
        factor: 2
