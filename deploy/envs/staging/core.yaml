# staging overlay for helm/core — EKS: ECR images (tags inherit the chart
# defaults, which CI pushes on every master merge), single replicas, halved
# resources.
auth:
  image:
    repository: 809379394639.dkr.ecr.us-east-1.amazonaws.com/myfitnessrank/auth
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 192Mi

backend:
  image:
    repository: 809379394639.dkr.ecr.us-east-1.amazonaws.com/myfitnessrank/backend
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 192Mi
