# Per-service CI: each service lints, tests, builds and (on master) pushes only
# when its own code or chart changed. PRs gate master; a master push is the
# staging deploy; prod releases build everything in release.yml. `CI OK` is the
# single required status check — it always runs, so path-skipped jobs can never
# deadlock branch protection.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A newer push to the same ref supersedes the running CI for it
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ── 0. What changed? ───────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      auth: ${{ steps.filter.outputs.auth }}
      leaderboards: ${{ steps.filter.outputs.leaderboards }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # Helm chart paths are included because chart values carry the image tags
      # the push step publishes under — a tag bump must rebuild the image.
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'helm/core/**'
              - 'helm/web-service/**'
              - '.github/workflows/ci.yml'
            auth:
              - 'auth/**'
              - 'helm/core/**'
              - 'helm/web-service/**'
              - '.github/workflows/ci.yml'
            leaderboards:
              - 'leaderboards/**'
              - 'helm/leaderboards/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'helm/frontend/**'
              - '.github/workflows/ci.yml'

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-24.04

    permissions:
      id-token: write   # OIDC for ECR
      contents: read

    services:
      postgres:
        image: postgres:15.6-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: fitrank_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest ruff==0.6.9

      - name: Lint
        run: |
          ruff check backend/
          ruff format --check backend/

      - name: Test
        working-directory: backend
        run: pytest -v

      - name: Build Docker image
        run: docker build --no-cache --tag "myfitnessrank/backend:${{ github.sha }}" backend/

      - name: Check AWS secrets are configured
        id: aws-check
        if: github.event_name == 'push'
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [[ -n "$AWS_ROLE_ARN" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.aws-check.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.aws-check.outputs.ready == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      # Staging (EKS) inherits the chart-default image tag, so a master merge
      # publishes both the immutable sha tag and the chart tag.
      - name: Push to ECR
        if: steps.aws-check.outputs.ready == 'true'
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          chart_tag=$(awk -v a="^backend:" '$0 ~ a{s=1; next} s && /^[a-z]/{s=0} s && /image:/{f=1} s && f && /tag:/{gsub(/[" ]/,"",$2); print $2; exit}' helm/core/values.yaml)
          [[ -n "$chart_tag" ]] || { echo "no chart tag for backend"; exit 1; }
          for tag in "${{ github.sha }}" "$chart_tag"; do
            docker tag "myfitnessrank/backend:${{ github.sha }}" "${REGISTRY}/myfitnessrank/backend:${tag}"
            docker push "${REGISTRY}/myfitnessrank/backend:${tag}"
          done

  # ── Auth ───────────────────────────────────────────────────────────────────
  auth:
    name: Auth
    needs: changes
    if: needs.changes.outputs.auth == 'true'
    runs-on: ubuntu-24.04

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: auth/requirements.txt

      - name: Install dependencies
        run: pip install -r auth/requirements.txt pytest ruff==0.6.9

      - name: Lint
        run: |
          ruff check auth/
          ruff format --check auth/

      - name: Test
        working-directory: auth
        env:
          JWT_SIGNING_KEY: test-signing-key-not-for-prod
        run: pytest -v

      - name: Build Docker image
        run: docker build --no-cache --tag "myfitnessrank/auth:${{ github.sha }}" auth/

      - name: Check AWS secrets are configured
        id: aws-check
        if: github.event_name == 'push'
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [[ -n "$AWS_ROLE_ARN" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.aws-check.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.aws-check.outputs.ready == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Push to ECR
        if: steps.aws-check.outputs.ready == 'true'
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          chart_tag=$(awk -v a="^auth:" '$0 ~ a{s=1; next} s && /^[a-z]/{s=0} s && /image:/{f=1} s && f && /tag:/{gsub(/[" ]/,"",$2); print $2; exit}' helm/core/values.yaml)
          [[ -n "$chart_tag" ]] || { echo "no chart tag for auth"; exit 1; }
          for tag in "${{ github.sha }}" "$chart_tag"; do
            docker tag "myfitnessrank/auth:${{ github.sha }}" "${REGISTRY}/myfitnessrank/auth:${tag}"
            docker push "${REGISTRY}/myfitnessrank/auth:${tag}"
          done

  # ── Leaderboards ───────────────────────────────────────────────────────────
  leaderboards:
    name: Leaderboards
    needs: changes
    if: needs.changes.outputs.leaderboards == 'true'
    runs-on: ubuntu-24.04

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: leaderboards/requirements.txt

      - name: Install dependencies
        run: pip install -r leaderboards/requirements.txt pytest ruff==0.6.9

      - name: Lint
        run: |
          ruff check leaderboards/
          ruff format --check leaderboards/

      - name: Test
        working-directory: leaderboards
        run: pytest -v

      - name: Build Docker image
        run: docker build --no-cache --tag "myfitnessrank/leaderboards:${{ github.sha }}" leaderboards/

      - name: Check AWS secrets are configured
        id: aws-check
        if: github.event_name == 'push'
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [[ -n "$AWS_ROLE_ARN" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.aws-check.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.aws-check.outputs.ready == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Push to ECR
        if: steps.aws-check.outputs.ready == 'true'
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          chart_tag=$(awk '/^image:/{f=1} f && /tag:/{gsub(/[" ]/,"",$2); print $2; exit}' helm/leaderboards/values.yaml)
          [[ -n "$chart_tag" ]] || { echo "no chart tag for leaderboards"; exit 1; }
          for tag in "${{ github.sha }}" "$chart_tag"; do
            docker tag "myfitnessrank/leaderboards:${{ github.sha }}" "${REGISTRY}/myfitnessrank/leaderboards:${tag}"
            docker push "${REGISTRY}/myfitnessrank/leaderboards:${tag}"
          done

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build Docker image
        working-directory: .
        run: docker build --no-cache --tag "myfitnessrank/frontend:${{ github.sha }}" frontend/

      - name: Check AWS secrets are configured
        id: aws-check
        if: github.event_name == 'push'
        working-directory: .
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [[ -n "$AWS_ROLE_ARN" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.aws-check.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.aws-check.outputs.ready == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Push to ECR
        if: steps.aws-check.outputs.ready == 'true'
        working-directory: .
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          chart_tag=$(awk '/^image:/{f=1} f && /tag:/{gsub(/[" ]/,"",$2); print $2; exit}' helm/frontend/values.yaml)
          [[ -n "$chart_tag" ]] || { echo "no chart tag for frontend"; exit 1; }
          for tag in "${{ github.sha }}" "$chart_tag"; do
            docker tag "myfitnessrank/frontend:${{ github.sha }}" "${REGISTRY}/myfitnessrank/frontend:${tag}"
            docker push "${REGISTRY}/myfitnessrank/frontend:${tag}"
          done

  # ── Required check ─────────────────────────────────────────────────────────
  # The one status check branch protection requires. Always runs; passes when
  # every service job either succeeded or was skipped by the path filter.
  ci-ok:
    name: CI OK
    needs: [changes, backend, auth, leaderboards, frontend]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Verify no job failed
        run: |
          for result in ${{ join(needs.*.result, ' ') }}; do
            case "$result" in
              failure|cancelled) echo "a needed job ended: ${result}"; exit 1 ;;
            esac
          done
          echo "all jobs passed or were skipped by the path filter"
