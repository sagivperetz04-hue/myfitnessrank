name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: ruff check
        run: ruff check backend/ auth/ leaderboards/

      - name: ruff format check
        run: ruff format --check backend/ auth/ leaderboards/

  # ── 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:15.6-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: fitrank_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run tests
        working-directory: backend
        run: pytest -v

  # ── 2b. Test Auth ──────────────────────────────────────────────────────────
  test-auth:
    name: Test Auth
    needs: lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: auth/requirements.txt

      - name: Install dependencies
        run: pip install -r auth/requirements.txt pytest

      - name: Run tests
        working-directory: auth
        env:
          JWT_SIGNING_KEY: test-signing-key-not-for-prod
        run: pytest -v

  # ── 2c. Test Leaderboards ──────────────────────────────────────────────────
  test-leaderboards:
    name: Test Leaderboards
    needs: lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: leaderboards/requirements.txt

      - name: Install dependencies
        run: pip install -r leaderboards/requirements.txt pytest

      - name: Run tests
        working-directory: leaderboards
        run: pytest -v

  # ── 3. Frontend ────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Lint & Test
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ── 4. Build & Push ────────────────────────────────────────────────────────
  build:
    name: Build & Push
    needs: [test, test-auth, test-leaderboards, frontend]
    runs-on: ubuntu-24.04

    permissions:
      id-token: write   # required for OIDC token request
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # Validates Dockerfile on every branch; confirms the image builds correctly
      - name: Build backend Docker image
        run: |
          docker build \
            --no-cache \
            --tag myfitnessrank/backend:${{ github.sha }} \
            backend/

      - name: Build auth Docker image
        run: |
          docker build \
            --no-cache \
            --tag myfitnessrank/auth:${{ github.sha }} \
            auth/

      - name: Build leaderboards Docker image
        run: |
          docker build \
            --no-cache \
            --tag myfitnessrank/leaderboards:${{ github.sha }} \
            leaderboards/

      # Checks whether AWS secrets are configured. Secrets cannot be referenced
      # in if: expressions directly — expose via step output instead.
      - name: Check AWS secrets are configured
        id: aws-check
        if: github.ref == 'refs/heads/master'
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [[ -n "$AWS_ROLE_ARN" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.aws-check.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.aws-check.outputs.ready == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Push to ECR
        if: steps.aws-check.outputs.ready == 'true'
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag myfitnessrank/backend:$IMAGE_TAG $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
