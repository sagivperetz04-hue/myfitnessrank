name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: ruff check
        run: ruff check backend/

      - name: ruff format check
        run: ruff format --check backend/

  # ── 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:15.6-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: fitrank_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run tests
        working-directory: backend
        run: pytest -v

  # ── 3. Build & Push ────────────────────────────────────────────────────────
  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-24.04

    permissions:
      id-token: write   # required for OIDC token request
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Validates Dockerfile on every branch; confirms the image builds correctly
      - name: Build Docker image
        run: |
          docker build \
            --no-cache \
            --tag myfitnessrank/backend:${{ github.sha }} \
            backend/

      # The next three steps only run on master AND only when AWS secrets exist.
      # Add the three secrets to GitHub repo settings to activate ECR push
      # with no code change required.

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/master' && secrets.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e831c8b509e3500  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/master' && secrets.AWS_ROLE_ARN != ''
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2.0.1

      - name: Push to ECR
        if: github.ref == 'refs/heads/master' && secrets.AWS_ROLE_ARN != ''
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag myfitnessrank/backend:$IMAGE_TAG $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
