# Release = semantic version tag. Pushing vX.Y.Z:
#   1. builds every service image at X.Y.Z and pushes to ECR
#   2. opens an auto-merging PR that bumps prod's pinned tags to X.Y.Z
# ArgoCD (EKS) then deploys prod from the merged pins — the tag is the release,
# git stays the single source of truth, and no human touches the cluster.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build, Push & Promote
    runs-on: ubuntu-24.04

    permissions:
      id-token: write       # OIDC for ECR
      contents: write       # push the promotion branch
      pull-requests: write  # open + auto-merge the promotion PR
      actions: write        # dispatch CI onto the promotion branch

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      # A release must point at code that already passed CI on master —
      # refuse tags cut from unmerged branches.
      - name: Verify tag is on master
        run: |
          git fetch origin master
          git merge-base --is-ancestor HEAD origin/master \
            || { echo "Tag ${GITHUB_REF_NAME} is not an ancestor of master"; exit 1; }

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Build and push release images
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for service in backend auth leaderboards frontend; do
            docker build --tag "${REGISTRY}/myfitnessrank/${service}:${VERSION}" "${service}/"
            docker push "${REGISTRY}/myfitnessrank/${service}:${VERSION}"
          done

      - name: Bump prod pins and open promotion PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git switch -c "release/v${VERSION}" origin/master
          # core.yaml nests tags 4 deep (auth:/backend: aliases); the service
          # overlays keep them 2 deep.
          sed -i -E "s|^(    tag: \").*(\")|\1${VERSION}\2|" deploy/envs/prod/core.yaml
          sed -i -E "s|^(  tag: \").*(\")|\1${VERSION}\2|"  deploy/envs/prod/leaderboards.yaml deploy/envs/prod/frontend.yaml
          # Keep the manifest's prod-pins line truthful (repo rule: the manifest
          # tracks every change, promotions included).
          sed -i -E "s|^Current prod pins: v[0-9]+\.[0-9]+\.[0-9]+|Current prod pins: v${VERSION}|" PROJECT_MANIFEST.md

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: promote v${VERSION} to prod"
          git push origin "release/v${VERSION}"

          gh pr create \
            --base master \
            --head "release/v${VERSION}" \
            --title "Promote v${VERSION} to prod" \
            --body "Automated promotion: pins prod image tags to \`${VERSION}\` (images already in ECR). Merging this PR is the deploy."
          # Auto-merge once required checks pass; if auto-merge is disabled on
          # the repo this leaves the PR open for a manual click.
          gh pr merge "release/v${VERSION}" --auto --merge || true

          # GITHUB_TOKEN pushes never trigger workflows, so the required CI OK
          # check would otherwise never report on this PR — dispatch it.
          gh workflow run CI --ref "release/v${VERSION}"
