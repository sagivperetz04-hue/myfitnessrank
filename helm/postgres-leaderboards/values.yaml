image:
  repository: postgres
  tag: "15.18-alpine"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  enabled: true
  port: 5432

# Secret with keys: username, password, database — created out-of-band,
# never committed to git
existingSecret: leaderboards-db-credentials

persistence:
  size: 1Gi
  # Empty = cluster default StorageClass ("standard" on kind)
  storageClassName: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# postgres user/group in the alpine image
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 70
  runAsGroup: 70
  fsGroup: 70

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 20

# pg_dump shipped to S3 on a schedule. Off by default; the prod overlay turns
# it on. Upload credentials come from EKS pod identity bound to the job's
# ServiceAccount (infra repo: live/us-east-1/db-backups) — no keys in-cluster,
# so this only runs on EKS, the only place real user data lives.
backup:
  enabled: false
  schedule: "0 */4 * * *"
  s3Bucket: ""
  s3Prefix: postgres-leaderboards
  awsCli:
    repository: public.ecr.aws/aws-cli/aws-cli
    tag: "2.35.19"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
