replicaCount: 2

image:
  repository: myfitnessrank-backend
  tag: "0.1.3"
  pullPolicy: IfNotPresent

# URL of the leaderboards service in the same namespace — /api/rank forwards
# signed-in users' best lifts there
leaderboardsUrl: http://leaderboards:5000

# For ECR: [{ name: ecr-registry-secret }]
imagePullSecrets: []

service:
  enabled: true
  type: ClusterIP
  port: 5000

# Disabled by default: the frontend nginx proxies /api/ to this service,
# so the API has no reason to be reachable from outside the cluster.
ingress:
  enabled: false
  className: nginx
  host: api.myfitnessrank.local
  path: /
  pathType: Prefix

db:
  # Service name of the postgres release in the same namespace
  host: postgres
  port: 5432
  # Secret with keys: username, password, database — created out-of-band,
  # never committed to git
  existingSecret: fitrank-db-credentials

# Secret holding the HS256 JWT signing key (key: signing-key) — SHARED with the
# auth service so /api/rank can verify a signed-in lifter's token and record the
# lift under the token's identity rather than a spoofable body field.
jwt:
  existingSecret: jwt-signing-key
  secretKey: signing-key

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
