{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "web-service.fullname" . }}
  labels:
    {{- include "web-service.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "web-service.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    # Per-pod request rate served by prometheus-adapter from
    # flask_http_request_total (see deploy/argocd/apps/prometheus-adapter.yaml).
    - type: Pods
      pods:
        metric:
          name: {{ .Values.autoscaling.metricName }}
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.targetRequestsPerSecond | quote }}
{{- end }}
