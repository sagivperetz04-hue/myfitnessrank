{{- if .Values.seedJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "leaderboards.fullname" . }}-seed
  labels:
    {{- include "leaderboards.labels" . | nindent 4 }}
  annotations:
    # A tracked resource, NOT a sync hook: ArgoCD's operation-resume path runs
    # with skipHooks=true, so a PostSync hook is silently dropped whenever the
    # sync pauses at "waiting for healthy state" and resumes a moment later —
    # prod booted with an empty leaderboard exactly this way. As a plain
    # resource the Job is recreated whenever it's missing (fresh boot) and
    # Replace clears the previous run despite Job immutability.
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: {{ .Values.seedJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "leaderboards.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: seed
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          # Retry so the Job tolerates the DB still coming up on a fresh install.
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 30); do
                python scripts/load_seed.py && exit 0
                echo "seed attempt $i failed; retrying in 5s"
                sleep 5
              done
              exit 1
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.existingSecret }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.existingSecret }}
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.existingSecret }}
                  key: database
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@{{ .Values.db.host }}:{{ .Values.db.port }}/$(DB_NAME)"
            - name: LEADERBOARD_ENC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.encryption.existingSecret }}
                  key: {{ .Values.encryption.secretKey }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
