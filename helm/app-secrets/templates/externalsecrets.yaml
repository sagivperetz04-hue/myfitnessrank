{{- range $env := .Values.environments }}
{{- $ns := printf "myfitnessrank-%s" $env }}
{{- $remote := printf "%s/%s/app" $.Values.secretPrefix $env }}
{{- range $db := list "fitrank" "auth" "leaderboards" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $db }}-db-credentials
  namespace: {{ $ns }}
  labels:
    app: myfitnessrank
    component: app-secrets
spec:
  refreshInterval: {{ $.Values.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $.Values.storeName }}
  target:
    name: {{ $db }}-db-credentials
  data:
    - secretKey: username
      remoteRef:
        key: {{ $remote }}
        property: {{ $db }}_db_username
    - secretKey: password
      remoteRef:
        key: {{ $remote }}
        property: {{ $db }}_db_password
    - secretKey: database
      remoteRef:
        key: {{ $remote }}
        property: {{ $db }}_db_database
{{- end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jwt-signing-key
  namespace: {{ $ns }}
  labels:
    app: myfitnessrank
    component: app-secrets
spec:
  refreshInterval: {{ $.Values.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $.Values.storeName }}
  target:
    name: jwt-signing-key
  data:
    - secretKey: signing-key
      remoteRef:
        key: {{ $remote }}
        property: jwt_signing_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: leaderboards-enc-key
  namespace: {{ $ns }}
  labels:
    app: myfitnessrank
    component: app-secrets
spec:
  refreshInterval: {{ $.Values.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $.Values.storeName }}
  target:
    name: leaderboards-enc-key
  data:
    - secretKey: fernet-key
      remoteRef:
        key: {{ $remote }}
        property: fernet_key
{{- if eq $env "prod" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: leaderboards-smtp-credentials
  namespace: {{ $ns }}
  labels:
    app: myfitnessrank
    component: app-secrets
spec:
  refreshInterval: {{ $.Values.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $.Values.storeName }}
  target:
    name: leaderboards-smtp-credentials
  data:
    - secretKey: user
      remoteRef:
        key: {{ $remote }}
        property: smtp_user
    - secretKey: password
      remoteRef:
        key: {{ $remote }}
        property: smtp_password
{{- end }}
{{- end }}
