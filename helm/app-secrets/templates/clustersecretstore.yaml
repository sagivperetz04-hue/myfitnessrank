apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.storeName }}
  labels:
    app: myfitnessrank
    component: app-secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.region }}
      # No auth block: the ESO controller's own pod identity is the credential
