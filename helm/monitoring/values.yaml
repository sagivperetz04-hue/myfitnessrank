# Namespace where the app services run — the ServiceMonitor targets them from the
# monitoring namespace, so it must name that namespace explicitly.
appNamespace: myfitnessrank

# Label shared by the three web services' Services (squat/auth/leaderboards all
# carry app=myfitnessrank). Postgres services share it too but expose no `http`
# port, so the http-only endpoint below never scrapes them.
appLabel: myfitnessrank

scrapeInterval: 30s

# Grafana dashboard ConfigMap, auto-imported by the kube-prometheus-stack Grafana
# sidecar (which watches its own namespace for the grafana_dashboard label).
dashboard:
  enabled: true
