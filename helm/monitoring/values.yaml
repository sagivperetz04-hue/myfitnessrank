# Environment namespaces where the app services run — the ServiceMonitor targets
# them from the monitoring namespace, so it must name each one explicitly.
appNamespaces:
  - myfitnessrank-dev
  - myfitnessrank-staging
  - myfitnessrank-prod

# Label shared by all the app Services. The three Flask services (backend/auth/
# leaderboards) expose /metrics on the "http" port; postgres shares the label but
# has no "http" port, and frontend has one but no /metrics — see excludeComponents.
appLabel: myfitnessrank

# Components carrying appLabel + an "http" port that must NOT be scraped (nginx
# frontend returns 404 on /metrics, which would show as a permanently down target).
excludeComponents:
  - frontend

scrapeInterval: 30s

# Grafana dashboard ConfigMap, auto-imported by the kube-prometheus-stack Grafana
# sidecar (which watches its own namespace for the grafana_dashboard label).
dashboard:
  enabled: true
